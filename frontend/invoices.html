<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoices - Third Eye Technologies</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">
      <i class="fas fa-store"></i> Sales & Service
    </a>
    <div class="navbar-links">
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="products.html"><i class="fas fa-box"></i> Products</a>
      <a href="service.html"><i class="fas fa-tools"></i> Services</a>
      <a href="login.html" id="authLink"><i class="fas fa-user"></i> Login</a>
      <button class="theme-toggle" onclick="toggleDarkMode()">
        <i class="fas fa-moon"></i>
      </button>
    </div>
  </nav>

  <div class="container">
    <div class="card slide-up">
      <h2><i class="fas fa-file-invoice"></i> My Invoices</h2>
      <p>View and download your invoices</p>
    </div>

    <div id="invoicesList" class="stats-grid">
      <div class="card text-center"><div class="loading"></div></div>
    </div>

    <!-- Simple Order Invoice (Task 5) -->
    <div class="card slide-up">
      <h3>Latest Order Invoice</h3>
      <div id="invoice"></div>
    </div>

    <!-- Invoice Preview Modal -->
    <div id="invoiceModal" class="modal">
      <div class="modal-content" style="max-width: 800px;">
        <div class="modal-header">
          <h3><i class="fas fa-file-invoice"></i> Invoice Preview</h3>
          <span class="modal-close" onclick="closeInvoiceModal()">&times;</span>
        </div>
        <div id="invoicePreview"></div>
        <div class="mt-2" style="text-align: right;">
          <button class="btn btn-primary" onclick="downloadInvoicePDF()">
            <i class="fas fa-download"></i> Download PDF
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script>
    let currentInvoice = null;

    async function loadInvoices() {
      const container = document.getElementById('invoicesList');
      const token = localStorage.getItem('token');
      const userEmail = localStorage.getItem('userEmail');

      try {
        let bills;
        
        if (token) {
          const response = await fetch('http://localhost:5000/api/billing', {
            headers: { 'Authorization': token }
          });
          bills = await response.json();
        } else {
          // For non-logged in users, show message
          container.innerHTML = '<div class="card"><p>Please login to view your invoices.</p><a href="login.html" class="btn btn-primary">Login</a></div>';
          return;
        }

        if (!bills || bills.length === 0) {
          container.innerHTML = '<div class="card text-center"><p>No invoices found.</p></div>';
          return;
        }

        // Filter for customer if logged in as customer
        let filteredBills = bills;
        const role = localStorage.getItem('role');
        if (role === 'customer') {
          filteredBills = bills.filter(b => b.customerName); // Could add email filter if needed
        }

        container.innerHTML = filteredBills.map(bill => `
          <div class="card slide-up">
            <div class="d-flex justify-between align-center">
              <div>
                <h3><i class="fas fa-file-invoice"></i> Invoice #${bill._id.substring(0, 8)}</h3>
                <p class="mt-1">
                  <strong>Customer:</strong> ${bill.customerName}<br>
                  <strong>Type:</strong> ${bill.type}<br>
                  <strong>Payment:</strong> ${bill.paymentMethod || 'N/A'}<br>
                  <strong>Date:</strong> ${new Date(bill.createdAt).toLocaleDateString()}
                </p>
              </div>
              <div class="text-right">
                <div class="price" style="font-size: 1.5rem;">₹${bill.totalAmount.toLocaleString()}</div>
                <p class="text-success"><i class="fas fa-check-circle"></i> Paid</p>
              </div>
            </div>
            <div class="mt-2">
              <button class="btn btn-primary" onclick="viewInvoice('${bill._id}')">
                <i class="fas fa-eye"></i> View
              </button>
              <button class="btn btn-success" onclick="viewInvoice('${bill._id}'); setTimeout(downloadInvoicePDF, 100)">
                <i class="fas fa-download"></i> Download
              </button>
            </div>
          </div>
        `).join('');
      } catch (error) {
        container.innerHTML = '<div class="alert alert-error">Error loading invoices. Make sure you are logged in.</div>';
      }
    }

    async function viewInvoice(invoiceId) {
      const token = localStorage.getItem('token');
      
      try {
        const response = await fetch('http://localhost:5000/api/billing', {
          headers: { 'Authorization': token }
        });
        const bills = await response.json();
        
        currentInvoice = bills.find(b => b._id === invoiceId);
        if (!currentInvoice) {
          alert('Invoice not found');
          return;
        }

        const preview = document.getElementById('invoicePreview');
        preview.innerHTML = `
          <div class="invoice-box" id="invoiceContent">
            <div class="invoice-header">
              <div>
                <div class="invoice-title">INVOICE</div>
                <p>Invoice #: ${currentInvoice._id.substring(0, 8)}</p>
                <p>Date: ${new Date(currentInvoice.createdAt).toLocaleDateString()}</p>
              </div>
              <div style="text-align: right;">
                <h3>Third Eye Technologies</h3>
                <p>Sales & Service Shop</p>
              </div>
            </div>
            
            <div class="invoice-details">
              <div>
                <h4>Bill To:</h4>
                <p>${currentInvoice.customerName}</p>
              </div>
              <div>
                <h4>Invoice Details:</h4>
                <p>Type: ${currentInvoice.type}</p>
                <p>GST: ${currentInvoice.gst}%</p>
              </div>
            </div>

            <table class="invoice-table">
              <thead>
                <tr>
                  <th>Description</th>
                  <th>Amount</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>${currentInvoice.type} Purchase (${currentInvoice.paymentMethod || 'N/A'})</td>
                  <td>₹${currentInvoice.amount.toLocaleString()}</td>
                </tr>
                <tr>
                  <td>GST (${currentInvoice.gst}%)</td>
                  <td>₹${(currentInvoice.amount * currentInvoice.gst / 100).toLocaleString()}</td>
                </tr>
              </tbody>
            </table>

            <div class="invoice-total">
              <p>Subtotal: ₹${currentInvoice.amount.toLocaleString()}</p>
              <p>GST: ₹${(currentInvoice.amount * currentInvoice.gst / 100).toLocaleString()}</p>
              <p class="amount">Total: ₹${currentInvoice.totalAmount.toLocaleString()}</p>
            </div>

            <div class="mt-3 text-center" style="border-top: 1px solid #ddd; padding-top: 1rem;">
              <p>Thank you for your business!</p>
              <p><small>GST Registered: 18%</small></p>
            </div>
          </div>
        `;

        document.getElementById('invoiceModal').style.display = 'flex';
      } catch (error) {
        console.error('Error loading invoice:', error);
        alert('Error loading invoice');
      }
    }

    function closeInvoiceModal() {
      document.getElementById('invoiceModal').style.display = 'none';
    }

    function downloadInvoicePDF() {
      if (!currentInvoice) return;

      const element = document.getElementById('invoiceContent');
      const opt = {
        margin: 10,
        filename: `invoice_${currentInvoice._id.substring(0, 8)}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      html2pdf().set(opt).from(element).save();
    }

    // Close modal when clicking outside
    window.onclick = function(event) {
      const modal = document.getElementById('invoiceModal');
      if (event.target === modal) {
        closeInvoiceModal();
      }
    }

    // Update auth link
    const token = localStorage.getItem('token');
    const authLink = document.getElementById('authLink');
    if (token) {
      authLink.innerHTML = '<i class="fas fa-sign-out-alt"></i> Logout';
      authLink.onclick = logout;
    }

    // Load latest order invoice
    async function loadLatestOrderInvoice() {
      try {
        const response = await fetch('http://localhost:5000/api/orders');
        const orders = await response.json();
        if (orders.length > 0) {
          const order = orders[0]; // Latest
          document.getElementById("invoice").innerHTML = `
            <h2>Invoice</h2>
            <p>Customer: ${order.customerName}</p>
            <p>Product: ${order.product?.name || order.productName || 'HP Printer'}</p>
            <p>Total: ₹${order.totalAmount || order.total || 0}</p>
            <p>Payment: ${order.paymentMethod}</p>
            <p>Status: ${order.paymentStatus}</p>
          `;
        } else {
          document.getElementById("invoice").innerHTML = '<p>No orders yet</p>';
        }
      } catch (error) {
        document.getElementById("invoice").innerHTML = '<p>Error loading invoice</p>';
      }
    }

    loadInvoices();
    loadLatestOrderInvoice();
  </script>

</body>
</html>
