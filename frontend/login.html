<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Third Eye Technologies</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <a href="index.html" style="display: inline-block; margin-bottom: 1.5rem; color: var(--text-muted); text-decoration: none; font-size: 0.95rem;">
        <i class="fa-solid fa-arrow-left" style="margin-right: 5px;"></i> Back to Home
      </a>
      <div class="logo-area">
        <i class="fa-solid fa-desktop fa-3x" style="color: var(--primary-color);"></i>
        <h1>Third Eye Technologies</h1>
        <p>Sales and Service Management System</p>
      </div>
      
      <form class="auth-form" action="#" method="POST" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
        </div>
        

        
        <button type="submit" class="btn btn-primary">
          <i class="fa-solid fa-right-to-bracket" style="margin-right: 8px;"></i> Sign In
        </button>
      </form>
      
      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Register here</a>
      </div>
    </div>
  </div>
  <script src="js/responsive.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
